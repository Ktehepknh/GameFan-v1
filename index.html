<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GamesFan OS | Mark-42 Studio</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --primary: #00adff;
            --bg: #0a0b0d;
            --sidebar: #111417;
            --card: #1c2127;
            --text: #ffffff;
            --text-dim: #9ea4a9;
            --danger: #ff4444;
        }

        [data-theme="blood"] {
            --primary: #ff4444;
            --bg: #1a0505;
            --sidebar: #2a0a0a;
            --card: #3a0f0f;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg); color: var(--text);
            overflow: hidden; transition: 0.3s;
        }

        /* --- AUTH SCREEN --- */
        #auth-screen {
            position: fixed; inset: 0;
            background: radial-gradient(circle at center, #1a2a3a 0%, #050505 100%);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000;
        }

        .auth-card {
            background: rgba(28, 33, 39, 0.9);
            backdrop-filter: blur(20px);
            padding: 40px; border-radius: 24px;
            width: 320px; border: 1px solid rgba(255,255,255,0.1);
            text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .auth-card h1 { color: var(--primary); margin: 0 0 20px 0; }

        input {
            width: 100%; padding: 12px; margin: 8px 0;
            background: rgba(0,0,0,0.3); border: 1px solid #333;
            border-radius: 10px; color: white; box-sizing: border-box;
            outline: none;
        }

        .btn {
            width: 100%; padding: 12px; border: none; border-radius: 10px;
            font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 10px;
        }
        .btn-main { background: var(--primary); color: white; }
        .btn-main:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-ghost { background: transparent; color: var(--text-dim); border: 1px solid #444; }

        /* --- MAIN APP --- */
        #app { display: none; height: 100vh; grid-template-columns: 240px 1fr 300px; }

        .sidebar { background: var(--sidebar); border-right: 1px solid #222; padding: 20px; display: flex; flex-direction: column; }
        .nav-link { padding: 12px; border-radius: 10px; cursor: pointer; margin: 4px 0; color: var(--text-dim); transition: 0.2s; }
        .nav-link:hover { background: #1c1f24; color: white; }
        .nav-link.active { background: #1c1f24; color: var(--primary); font-weight: bold; border-left: 4px solid var(--primary); }

        .main-view { padding: 30px; overflow-y: auto; background: var(--bg); position: relative; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; margin-top: 20px; }

        .game-card {
            background: var(--card); border-radius: 15px; padding: 20px; text-align: center;
            border: 1px solid #222; transition: 0.3s; cursor: pointer;
        }
        .game-card:hover { border-color: var(--primary); transform: translateY(-5px); }

        /* --- FRIENDS & MESSENGER --- */
        .friends-panel { background: var(--sidebar); border-left: 1px solid #222; display: flex; flex-direction: column; }
        .chat-area { flex-grow: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .msg { background: var(--card); padding: 10px; border-radius: 10px; font-size: 14px; border: 1px solid #333; }
        .msg b { color: var(--primary); display: block; font-size: 11px; margin-bottom: 3px; }

        #game-frame { width: 100%; height: 100%; border: none; display: none; border-radius: 15px; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h1>GamesFan</h1>
            <p style="color:var(--text-dim); font-size:12px; margin-bottom:20px;">MARK-42 STUDIO HUB</p>
            <input type="text" id="reg-nick" placeholder="Твой ник">
            <input type="email" id="reg-email" placeholder="Email">
            <input type="password" id="reg-pass" placeholder="Пароль">
            <button class="btn btn-main" onclick="handleAuth('reg')">Создать аккаунт</button>
            <button class="btn btn-ghost" onclick="handleAuth('login')">Войти</button>
        </div>
    </div>

    <div id="app">
        <aside class="sidebar">
            <h2 style="color:var(--primary)">GamesFan</h2>
            <div class="nav-link active" onclick="showTab('home', this)">🏠 Игры</div>
            <div class="nav-link" onclick="showTab('profile', this)">👤 Профиль</div>
            <div class="nav-link" onclick="showTab('settings', this)">⚙️ Настройки</div>
            <div style="margin-top:auto">
                <p style="font-size:10px; color:#444">© 2026 Mark-42 Studio</p>
                <button class="btn btn-ghost" onclick="firebase.auth().signOut()">Выход</button>
            </div>
        </aside>

        <main class="main-view">
            <div id="tab-home">
                <h1 id="welcome-msg">Загрузка...</h1>
                <div class="grid">
                    <div class="game-card" onclick="launch('Slime Clicker/index.html')">🟢<br>Slime Clicker</div>
                    <div class="game-card" onclick="launch('Runner2D/index.html')">🏃<br>Runner 2D</div>
                    <div class="game-card" onclick="launch('Parkour/index.html')">🪜<br>Parkour</div>
                    <div class="game-card" onclick="launch('ELBERR_OS/Chapter1/index.html')">💾<br>ELBERR: CH 1</div>
                </div>
            </div>

            <iframe id="game-frame"></iframe>

            <div id="tab-profile" class="hidden">
                <h1>Твой профиль</h1>
                <div style="background:var(--card); padding:20px; border-radius:15px; border:1px solid #333;">
                    <h2 id="p-nick-display">...</h2>
                    <p id="p-email-display" style="color:var(--text-dim)"></p>
                    <p>Ранг: <span style="color:var(--primary)">Разработчик Mark-42</span></p>
                </div>
            </div>

            <div id="tab-settings" class="hidden">
                <h1>Настройки</h1>
                <p>Тема оформления:</p>
                <button class="btn btn-ghost" onclick="setTheme('default')">Deep Space (Blue)</button>
                <button class="btn btn-ghost" onclick="setTheme('blood')" style="border-color:var(--danger)">Blood Energy (Red)</button>
            </div>
        </main>

        <section class="friends-panel">
            <div style="padding:15px; border-bottom:1px solid #222">
                <b>Мессенджер</b>
            </div>
            <div class="chat-area" id="chat-box"></div>
            <div style="padding:10px; border-top:1px solid #222">
                <input type="text" id="chat-input" placeholder="Написать всем..." onkeydown="if(event.key==='Enter') sendMsg()">
            </div>
        </section>
    </div>

    <script>
        // ТВОИ КЛЮЧИ FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyDnniEB9asHQFUl0wwZvkxXpmDi9l_lYAI",
            authDomain: "gamesfan-17986.firebaseapp.com",
            projectId: "gamesfan-17986",
            storageBucket: "gamesfan-17986.firebasestorage.app",
            messagingSenderId: "311654524584",
            appId: "1:311654524584:web:9283eea0aea6f7b946849d",
            measurementId: "G-0SD750FNB6"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let currentUserNick = "Игрок";

        // ЛОГИКА АВТОРИЗАЦИИ
        async function handleAuth(mode) {
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;
            const nick = document.getElementById('reg-nick').value;

            if(!email || !pass) return alert("Заполни поля!");

            try {
                if(mode === 'reg') {
                    if(!nick) return alert("Введи ник!");
                    const res = await auth.createUserWithEmailAndPassword(email, pass);
                    await db.ref('users/' + res.user.uid).set({ nick: nick, email: email });
                    alert("Успех! Теперь нажми Войти");
                } else {
                    await auth.signInWithEmailAndPassword(email, pass);
                }
            } catch(e) { alert(e.message); }
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app').style.display = 'grid';
                
                db.ref('users/' + user.uid).once('value', s => {
                    const data = s.val();
                    currentUserNick = data.nick;
                    document.getElementById('welcome-msg').innerText = "Привет, " + currentUserNick + "!";
                    document.getElementById('p-nick-display').innerText = currentUserNick;
                    document.getElementById('p-email-display').innerText = data.email;
                });
                loadChat();
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('app').style.display = 'none';
            }
        });

        // ЧАТ
        function sendMsg() {
            const input = document.getElementById('chat-input');
            if(!input.value) return;
            db.ref('chat').push({
                nick: currentUserNick,
                text: input.value,
                time: Date.now()
            });
            input.value = "";
        }

        function loadChat() {
            db.ref('chat').limitToLast(30).on('child_added', s => {
                const m = s.val();
                const div = document.createElement('div');
                div.className = 'msg';
                div.innerHTML = `<b>${m.nick}</b>${m.text}`;
                const box = document.getElementById('chat-box');
                box.appendChild(div);
                box.scrollTop = box.scrollHeight;
            });
        }

        // НАВИГАЦИЯ
        function showTab(tab, el) {
            document.querySelectorAll('.main-view > div').forEach(d => d.classList.add('hidden'));
            document.getElementById('game-frame').style.display = 'none';
            document.getElementById('tab-' + tab).classList.remove('hidden');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            el.classList.add('active');
        }

        function launch(path) {
            document.getElementById('tab-home').classList.add('hidden');
            const f = document.getElementById('game-frame');
            f.style.display = 'block';
            f.src = path;
        }

        function setTheme(t) {
            document.documentElement.setAttribute('data-theme', t === 'blood' ? 'blood' : '');
        }
    </script>
</body>
</html>
