<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GamesFan OS | Mark-42 Studio</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #00adff; --bg: #0a0b0d; --sidebar: #111417; --card: #1c2127; --text: #ffffff; --text-dim: #9ea4a9; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
        
        /* UI Elements */
        #auth-screen { position: fixed; inset: 0; background: radial-gradient(circle, #1a2a3a, #050505); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .auth-card { background: rgba(28,33,39,0.9); padding: 40px; border-radius: 24px; width: 320px; text-align: center; border: 1px solid #333; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #333; border-radius: 10px; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 5px; }
        .btn-blue { background: var(--primary); color: white; }
        
        /* Layout */
        #app { display: none; height: 100vh; grid-template-columns: 240px 1fr; }
        .sidebar { background: var(--sidebar); border-right: 1px solid #222; padding: 20px; display: flex; flex-direction: column; }
        .nav-link { padding: 12px; border-radius: 10px; cursor: pointer; margin: 4px 0; color: var(--text-dim); }
        .nav-link.active { background: #1c1f24; color: var(--primary); font-weight: bold; border-left: 4px solid var(--primary); }
        .main-view { padding: 30px; overflow-y: auto; position: relative; }

        /* Game & Posts */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .post-card { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 15px; border-left: 4px solid var(--primary); }
        .post-author { font-size: 12px; color: var(--primary); margin-bottom: 5px; }

        /* Chat Rooms */
        .chat-room-box { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #333; }
        #chat-window { height: 300px; overflow-y: auto; background: #000; padding: 10px; border-radius: 10px; margin-bottom: 10px; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h1>GamesFan</h1>
            <input type="text" id="reg-nick" placeholder="Никнейм">
            <input type="email" id="reg-email" placeholder="Email">
            <input type="password" id="reg-pass" placeholder="Пароль">
            <button class="btn btn-blue" onclick="handleAuth('reg')">Зарегистрироваться</button>
            <button class="btn" style="color:#888" onclick="handleAuth('login')">Уже есть аккаунт? Войти</button>
        </div>
    </div>

    <div id="app">
        <aside class="sidebar">
            <h2 style="color:var(--primary)">GamesFan</h2>
            <div class="nav-link active" onclick="showTab('home', this)">🏠 Игры</div>
            <div class="nav-link" onclick="showTab('chats', this)">💬 Мессенджер</div>
            <div class="nav-link" onclick="showTab('profile', this)">👤 Профиль</div>
            <div class="nav-link hidden" id="admin-link" onclick="showTab('admin', this)" style="color: #ffcc00;">⚡ Админка</div>
            <button class="btn btn-blue" style="margin-top:auto; background:#333" onclick="firebase.auth().signOut()">Выход</button>
        </aside>

        <main class="main-view">
            <div id="tab-home">
                <h1>Библиотека</h1>
                <div class="grid">
                    <div class="btn" style="background:var(--card)" onclick="launch('Slime Clicker/index.html')">🟢 Slime Clicker</div>
                    <div class="btn" style="background:var(--card)" onclick="launch('ELBERR_OS/Chapter1/index.html')">💾 ELBERR OS</div>
                </div>
            </div>

            <div id="tab-chats" class="hidden">
                <h1>Чаты</h1>
                <div style="display:flex; gap:10px; margin-bottom:20px;">
                    <input type="text" id="new-room-name" placeholder="Название нового чата...">
                    <button class="btn btn-blue" style="width:150px" onclick="createRoom()">Создать чат</button>
                </div>
                <div id="rooms-list"></div>
                <div id="active-chat" class="hidden">
                    <h2 id="current-room-name">Чат</h2>
                    <div id="chat-window"></div>
                    <div style="display:flex; gap:5px">
                        <input type="text" id="chat-msg" placeholder="Сообщение...">
                        <button class="btn btn-blue" style="width:100px" onclick="sendMsg()">></button>
                    </div>
                </div>
            </div>

            <div id="tab-profile" class="hidden">
                <h1 id="p-nick">Загрузка...</h1>
                <div style="background:var(--card); padding:20px; border-radius:15px; margin-bottom:20px;">
                    <h3>Создать пост</h3>
                    <textarea id="post-text" placeholder="О чем ты думаешь, Creater?"></textarea>
                    <button class="btn btn-blue" onclick="createPost()">Опубликовать пост</button>
                </div>
                <h3>Лента новостей</h3>
                <div id="posts-feed"></div>
            </div>

            <div id="tab-admin" class="hidden">
                <h1 style="color:#ffcc00">Панель Создателя</h1>
                <button class="btn" style="background:#ff4444; color:white" onclick="db.ref('posts').remove()">🗑 Удалить все посты</button>
                <button class="btn" style="background:#ff4444; color:white; margin-top:10px" onclick="db.ref('chatRooms').remove()">🗑 Удалить все чаты</button>
            </div>

            <iframe id="game-frame" class="hidden" style="width:100%; height:90%; border:none;"></iframe>
        </main>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDnniEB9asHQFUl0wwZvkxXpmDi9l_lYAI",
            authDomain: "gamesfan-17986.firebaseapp.com",
            projectId: "gamesfan-17986",
            storageBucket: "gamesfan-17986.firebasestorage.app",
            messagingSenderId: "311654524584",
            appId: "1:311654524584:web:9283eea0aea6f7b946849d",
            measurementId: "G-0SD750FNB6"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        let myNick = "";
        let currentRoomId = null;

        // AUTH
        async function handleAuth(mode) {
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;
            const nick = document.getElementById('reg-nick').value;
            try {
                if(mode === 'reg') {
                    const r = await auth.createUserWithEmailAndPassword(email, pass);
                    await db.ref('users/' + r.user.uid).set({ nick: nick, email: email });
                } else { await auth.signInWithEmailAndPassword(email, pass); }
            } catch(e) { alert(e.message); }
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app').style.display = 'grid';
                if(user.email === "vetrovlev1@gmail.com") document.getElementById('admin-link').classList.remove('hidden');
                db.ref('users/' + user.uid).on('value', s => { 
                    myNick = s.val().nick; 
                    document.getElementById('p-nick').innerText = myNick;
                });
                loadPosts();
                loadRooms();
            } else { document.getElementById('auth-screen').style.display = 'flex'; document.getElementById('app').style.display = 'none'; }
        });

        // POSTS
        function createPost() {
            const txt = document.getElementById('post-text').value;
            if(!txt) return;
            db.ref('posts').push({ author: myNick, text: txt, time: Date.now() });
            document.getElementById('post-text').value = "";
        }

        function loadPosts() {
            db.ref('posts').on('value', s => {
                const feed = document.getElementById('posts-feed');
                feed.innerHTML = "";
                s.forEach(p => {
                    const data = p.val();
                    feed.innerHTML = `<div class="post-card"><div class="post-author">${data.author}</div>${data.text}</div>` + feed.innerHTML;
                });
            });
        }

        // CHAT ROOMS
        function createRoom() {
            const name = document.getElementById('new-room-name').value;
            if(!name) return;
            db.ref('chatRooms').push({ name: name, creator: myNick });
            document.getElementById('new-room-name').value = "";
        }

        function loadRooms() {
            db.ref('chatRooms').on('value', s => {
                const list = document.getElementById('rooms-list');
                list.innerHTML = "";
                s.forEach(r => {
                    list.innerHTML += `<div class="chat-room-box"><b>${r.val().name}</b><br><button class="btn btn-blue" style="width:100px; padding:5px" onclick="openRoom('${r.key}', '${r.val().name}')">Войти</button></div>`;
                });
            });
        }

        function openRoom(id, name) {
            currentRoomId = id;
            document.getElementById('active-chat').classList.remove('hidden');
            document.getElementById('current-room-name').innerText = "Чат: " + name;
            const win = document.getElementById('chat-window');
            win.innerHTML = "";
            db.ref('messages/' + id).off();
            db.ref('messages/' + id).on('child_added', s => {
                win.innerHTML += `<div><b>${s.val().user}:</b> ${s.val().text}</div>`;
                win.scrollTop = win.scrollHeight;
            });
        }

        function sendMsg() {
            const t = document.getElementById('chat-msg').value;
            if(!t || !currentRoomId) return;
            db.ref('messages/' + currentRoomId).push({ user: myNick, text: t });
            document.getElementById('chat-msg').value = "";
        }

        // NAV
        function showTab(id, el) {
            document.querySelectorAll('.main-view > div').forEach(d => d.classList.add('hidden'));
            document.getElementById('game-frame').classList.add('hidden');
            document.getElementById('tab-' + id).classList.remove('hidden');
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }

        function launch(path) {
            document.querySelectorAll('.main-view > div').forEach(d => d.classList.add('hidden'));
            const f = document.getElementById('game-frame');
            f.classList.remove('hidden');
            f.src = path;
        }
    </script>
</body>
</html>
