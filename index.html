<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mark-42 Studio | GamesFan OS</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --g-blue: #1a73e8; --g-bg: #ffffff; --g-surface: #f8f9fa; --g-border: #dadce0;
            --g-text: #202124; --g-text-light: #5f6368; --orange: #ff8c00; --shadow: 0 1px 3px rgba(60,64,67,0.3);
        }
        [data-theme="dark"] {
            --g-bg: #0b0e14; --g-surface: #1c2128; --g-border: #444c56;
            --g-text: #adbac7; --g-text-light: #768390; --g-blue: #539bf5;
        }

        * { box-sizing: border-box; font-family: 'Roboto', sans-serif; transition: 0.2s; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--g-bg); color: var(--g-text); overflow: hidden; }

        #app { display: none; height: 100vh; grid-template-rows: auto 1fr; }
        .app-container { display: grid; grid-template-columns: 250px 1fr; height: 100%; }

        /* Sidebar */
        .sidebar { background: var(--g-bg); border-right: 1px solid var(--g-border); padding: 20px 0; display: flex; flex-direction: column; }
        .nav-item { padding: 12px 24px; cursor: pointer; color: var(--g-text-light); font-size: 14px; border-radius: 0 20px 20px 0; margin-right: 10px; margin-bottom: 4px; }
        .nav-item.active { background: #e8f0fe; color: var(--g-blue); font-weight: 700; }
        [data-theme="dark"] .nav-item.active { background: #2d333b; }

        .main { padding: 30px; overflow-y: auto; background: var(--g-bg); }
        .view { display: none; animation: fadeIn 0.3s; }
        .view.active { display: block; }

        /* Posts & UI */
        .post { background: var(--g-surface); border: 1px solid var(--g-border); border-radius: 8px; padding: 15px; margin-bottom: 15px; position: relative; }
        .post-actions { position: absolute; top: 10px; right: 10px; display: flex; gap: 5px; }
        .btn-mini { padding: 4px 8px; font-size: 10px; border-radius: 4px; border: none; cursor: pointer; }
        .nick-orange { color: var(--orange) !important; font-weight: 900 !important; }

        /* Save Editor */
        #save-editor-area { width: 100%; height: 150px; background: #000; color: #0f0; font-family: monospace; border-radius: 5px; padding: 10px; margin: 10px 0; }

        /* Overlay */
        #game-overlay { position: fixed; inset: 0; background: #000; z-index: 9000; display: none; flex-direction: column; }
        .game-bar { height: 45px; background: #202124; display: flex; align-items: center; padding: 0 15px; color: white; justify-content: space-between; }
        iframe { flex-grow: 1; border: none; }
    </style>
</head>
<body>

    <div id="auth-screen" style="display: flex; align-items: center; justify-content: center; height: 100vh;">
        <div style="width: 350px; text-align: center; border: 1px solid var(--g-border); padding: 30px; border-radius: 8px;">
            <h2>Mark-42 Login</h2>
            <input type="email" id="reg-email" placeholder="Email" style="width:100%; padding:10px; margin:5px 0;">
            <input type="password" id="reg-pass" placeholder="Пароль" style="width:100%; padding:10px; margin:5px 0;">
            <button onclick="processAuth()" style="width:100%; padding:10px; background:var(--g-blue); color:white; border:none; margin-top:10px;">Войти</button>
        </div>
    </div>

    <div id="app">
        <div class="app-container">
            <aside class="sidebar">
                <div style="padding: 0 24px 25px; font-weight: 700; color: var(--g-blue); font-size: 18px;">Mark-42 Studio</div>
                <div class="nav-item active" onclick="switchTab('games', this)">🎮 Библиотека</div>
                <div class="nav-item" onclick="switchTab('social', this)">🌍 Сообщество</div>
                <div class="nav-item" onclick="switchTab('chat', this)">💬 Чат Студии</div>
                <div class="nav-item" onclick="switchTab('settings', this)">⚙️ Настройки</div>
                <div class="nav-item hidden" id="admin-nav" onclick="switchTab('admin', this)" style="color:red; font-weight:bold;">⚡ АДМИНКА</div>
            </aside>

            <main class="main">
                <div id="view-games" class="view active">
                    <h1>Твои проекты</h1>
                    <div style="padding:20px; border:1px solid var(--g-border); cursor:pointer;" onclick="launchGame('SlimeClicker/index.html', 'Slime Clicker 2D')">
                        <b>🟢 Slime Clicker 2D</b><br><small>Версия 3.0</small>
                    </div>
                </div>

                <div id="view-social" class="view">
                    <h1>Лента постов</h1>
                    <div class="post">
                        <textarea id="post-input" placeholder="Написать пост..." style="width:100%; height:60px; border:none; background:transparent; color:var(--g-text); resize:none;"></textarea>
                        <button onclick="sendPost()" style="background:var(--g-blue); color:white; border:none; padding:8px 15px; border-radius:4px; float:right;">Опубликовать</button>
                        <div style="clear:both"></div>
                    </div>
                    <div id="feed-container"></div>
                </div>

                <div id="view-chat" class="view">
                    <h1>Глобальный чат</h1>
                    <div id="chat-window" style="height:300px; border:1px solid var(--g-border); overflow-y:auto; padding:15px; background:var(--g-surface); margin-bottom:10px;"></div>
                    <input type="text" id="chat-target" placeholder="Ник друга (для приглашения)" style="width:100%; padding:10px; margin-bottom:5px;">
                    <input type="text" id="chat-input" placeholder="Сообщение..." style="width:100%; padding:10px;">
                    <button onclick="sendChatMsg()" style="width:100%; margin-top:5px; padding:10px; background:var(--g-blue); color:white; border:none;">Отправить</button>
                </div>

                <div id="view-settings" class="view">
                    <h1>Настройки профиля</h1>
                    <button onclick="applyTheme('dark')">🌙 Темная тема</button>
                    <button onclick="applyTheme('light')">☀️ Светлая тема</button>
                    <hr>
                    <button onclick="firebase.auth().signOut()" style="background:#ff4444; color:white; border:none; padding:10px;">Выйти</button>
                </div>

                <div id="view-admin" class="view">
                    <h1 style="color:red">Панель Управления</h1>
                    <div class="post" style="border-color:red">
                        <h3>Редактор сохранений игры</h3>
                        <p>Данные локального файла `m42_slime_save`:</p>
                        <textarea id="save-editor-area"></textarea>
                        <button onclick="loadSaveToEditor()" style="background:orange;">ЗАГРУЗИТЬ ИЗ ПАМЯТИ</button>
                        <button onclick="applySaveFromEditor()" style="background:green; color:white;">СОХРАНИТЬ ИЗМЕНЕНИЯ</button>
                    </div>
                    <div class="post" style="border-color:red">
                        <h3>Очистка данных</h3>
                        <button onclick="db.ref('posts').remove()">Удалить ВСЕ посты</button>
                        <button onclick="db.ref('chat').remove()">Очистить чат</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div id="game-overlay">
        <div class="game-bar">
            <span id="game-title">Игра</span>
            <button onclick="closeGame()" style="background:red; color:white; border:none; padding:5px 10px;">Закрыть ✖</button>
        </div>
        <iframe id="game-frame" src=""></iframe>
    </div>

    <script>
        // FIREBASE CONFIG (ВСТАВЬ СВОЙ ИЗ index (1).html)
        const firebaseConfig = {
            apiKey: "AIzaSyDnniEB9asHQFUl0wwZvkxXpmDi9l_lYAI",
            authDomain: "gamesfan-17986.firebaseapp.com",
            projectId: "gamesfan-17986",
            databaseURL: "https://gamesfan-17986-default-rtdb.firebaseio.com/",
            appId: "1:311654524584:web:9283eea0aea6f7b946849d"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let isAdmin = false;

        // AUTH
        async function processAuth() {
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;
            try { await auth.signInWithEmailAndPassword(email, pass); } catch(e) { alert(e.message); }
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app').style.display = 'grid';
                if(user.email === "vetrovlev1@gmail.com") {
                    isAdmin = true;
                    document.getElementById('admin-nav').classList.remove('hidden');
                }
                loadPosts();
                loadChat();
            }
        });

        // СООБЩЕСТВО (ПОСТЫ)
        function sendPost() {
            const txt = document.getElementById('post-input').value;
            if(!txt) return;
            db.ref('posts').push({
                author: isAdmin ? "Creater ktehepknh" : auth.currentUser.email,
                text: txt,
                uid: auth.currentUser.uid,
                time: Date.now(),
                isCreator: isAdmin
            });
            document.getElementById('post-input').value = "";
        }

        function loadPosts() {
            db.ref('posts').on('value', s => {
                const container = document.getElementById('feed-container');
                container.innerHTML = "";
                s.forEach(snap => {
                    const p = snap.val();
                    const key = snap.key;
                    const isMyPost = p.uid === auth.currentUser.uid;
                    
                    let actions = "";
                    if(isMyPost) actions += `<button class="btn-mini" onclick="editPost('${key}', '${p.text}')">✎</button>`;
                    if(isAdmin || isMyPost) actions += `<button class="btn-mini" style="color:red" onclick="db.ref('posts/${key}').remove()">✖</button>`;

                    container.innerHTML = `
                        <div class="post">
                            <b class="${p.isCreator ? 'nick-orange' : ''}">${p.author}</b>
                            <div class="post-actions">${actions}</div>
                            <p id="text-${key}">${p.text}</p>
                        </div>
                    ` + container.innerHTML;
                });
            });
        }

        function editPost(key, oldText) {
            const newText = prompt("Редактировать пост:", oldText);
            if(newText) db.ref('posts/' + key).update({ text: newText });
        }

        // РЕДАКТОР СОХРАНЕНИЙ (АДМИНКА)
        function loadSaveToEditor() {
            const save = localStorage.getItem('m42_slime_save') || "{}";
            document.getElementById('save-editor-area').value = save;
        }

        function applySaveFromEditor() {
            const newData = document.getElementById('save-editor-area').value;
            localStorage.setItem('m42_slime_save', newData);
            alert("Сохранение обновлено! В игре данные изменятся после перезагрузки.");
        }

        // ЧАТ
        function sendChatMsg() {
            const msg = document.getElementById('chat-input').value;
            const target = document.getElementById('chat-target').value;
            if(!msg) return;
            db.ref('chat').push({
                user: isAdmin ? "Лев (Mark-42)" : "Игрок",
                text: msg,
                to: target || "Всем"
            });
            document.getElementById('chat-input').value = "";
        }

        function loadChat() {
            db.ref('chat').limitToLast(20).on('value', s => {
                const win = document.getElementById('chat-window');
                win.innerHTML = "";
                s.forEach(snap => {
                    const m = snap.val();
                    win.innerHTML += `<div><b>${m.user}</b> [для ${m.to}]: ${m.text}</div>`;
                });
                win.scrollTop = win.scrollHeight;
            });
        }

        // SYSTEM
        function switchTab(id, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }

        function launchGame(path, title) {
            document.getElementById('game-overlay').style.display = 'flex';
            document.getElementById('game-title').innerText = title;
            document.getElementById('game-frame').src = path;
        }

        function closeGame() {
            document.getElementById('game-overlay').style.display = 'none';
            document.getElementById('game-frame').src = "";
        }

        function applyTheme(t) { document.documentElement.setAttribute('data-theme', t); }
    </script>
</body>
</html>
