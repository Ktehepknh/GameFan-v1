<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GamesFan OS | Mark-42 Studio</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --g-blue: #1a73e8;
            --g-bg: #ffffff;
            --g-surface: #f8f9fa;
            --g-border: #dadce0;
            --g-text: #202124;
            --g-text-light: #5f6368;
            --shadow: 0 1px 2px rgba(60,64,67,0.3), 0 1px 3px rgba(60,64,67,0.15);
        }

        [data-theme="dark"] {
            --g-bg: #0b0e14;
            --g-surface: #1c2128;
            --g-border: #444c56;
            --g-text: #adbac7;
            --g-text-light: #768390;
            --g-blue: #539bf5;
        }

        * { box-sizing: border-box; font-family: 'Roboto', sans-serif; transition: 0.2s; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--g-bg); color: var(--g-text); overflow: hidden; }

        /* --- AUTH --- */
        #auth-screen { position: fixed; inset: 0; background: var(--g-bg); display: flex; align-items: center; justify-content: center; z-index: 5000; }
        .auth-card { width: 380px; padding: 40px; border: 1px solid var(--g-border); border-radius: 8px; text-align: center; box-shadow: var(--shadow); }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid var(--g-border); border-radius: 4px; font-size: 14px; background: transparent; color: var(--g-text); outline: none; }
        input:focus { border-color: var(--g-blue); border-width: 2px; padding: 11px; }
        .btn { padding: 10px 24px; border-radius: 4px; border: none; font-weight: 500; cursor: pointer; transition: 0.2s; }
        .btn-blue { background: var(--g-blue); color: white; }

        /* --- LAYOUT --- */
        #app { display: none; height: 100vh; grid-template-columns: 240px 1fr; }
        .sidebar { background: var(--g-bg); border-right: 1px solid var(--g-border); padding: 20px 0; display: flex; flex-direction: column; }
        .nav-item { padding: 12px 24px; cursor: pointer; color: var(--g-text-light); border-radius: 0 20px 20px 0; margin-right: 10px; margin-bottom: 4px; }
        .nav-item:hover { background: var(--g-surface); }
        .nav-item.active { background: #e8f0fe; color: var(--g-blue); font-weight: 500; }
        [data-theme="dark"] .nav-item.active { background: #2d333b; }

        .main { padding: 30px; overflow-y: auto; background: var(--g-bg); }
        .view { display: none; animation: fadeIn 0.3s; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- CARDS & GRID --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card { background: var(--g-bg); border: 1px solid var(--g-border); border-radius: 8px; padding: 20px; text-align: center; cursor: pointer; }
        .card:hover { border-color: var(--g-blue); box-shadow: var(--shadow); }

        /* --- CHAT & SOCIAL (PERSISTENT) --- */
        .post { background: var(--g-surface); border: 1px solid var(--g-border); border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        .post-author { font-weight: 700; color: var(--g-blue); font-size: 13px; margin-bottom: 5px; }
        
        #chat-window { height: 400px; border: 1px solid var(--g-border); border-radius: 8px; padding: 15px; overflow-y: auto; background: var(--g-surface); display: flex; flex-direction: column; gap: 10px; }
        .bubble { padding: 8px 12px; border-radius: 12px; font-size: 14px; max-width: 75%; position: relative; }
        .bubble-me { align-self: flex-end; background: var(--g-blue); color: white; border-bottom-right-radius: 2px; }
        .bubble-them { align-self: flex-start; background: #e1e3e6; color: #000; border-bottom-left-radius: 2px; }
        .bubble small { display: block; font-size: 10px; opacity: 0.7; margin-bottom: 3px; }

        /* --- OVERLAY --- */
        #game-overlay { position: fixed; inset: 0; background: #000; z-index: 9000; display: none; flex-direction: column; }
        .bar { height: 45px; background: #202124; display: flex; align-items: center; padding: 0 15px; color: #fff; justify-content: space-between; }
        iframe { flex-grow: 1; border: none; background: white; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h2 id="at">GamesFan PRO</h2>
            <p style="color:var(--g-text-light); font-size:13px; margin-bottom:25px;">Mark-42 Studio Hub</p>
            <input type="text" id="a-nick" placeholder="Твой ник">
            <input type="email" id="a-email" placeholder="Email">
            <input type="password" id="a-pass" placeholder="Пароль">
            <button class="btn btn-blue" style="width:100%; margin-top:10px;" onclick="handleAuth()">Войти в систему</button>
            <button class="btn" style="background:none; color:var(--g-blue); font-size:12px; margin-top:10px;" onclick="swapAuth()" id="swap-btn">Нет аккаунта? Создать</button>
        </div>
    </div>

    <div id="app">
        <aside class="sidebar">
            <div style="padding: 10px 24px 30px; font-size: 20px; font-weight: 500; color: var(--g-blue);">Mark-42</div>
            <div class="nav-item active" onclick="tab('games', this)">🎮 Игры</div>
            <div class="nav-item" onclick="tab('social', this)">🌍 Сообщество</div>
            <div class="nav-item" onclick="tab('chats', this)">💬 Чаты</div>
            <div class="nav-item" onclick="tab('settings', this)">⚙️ Настройки</div>
            <div class="nav-item hidden" id="adm" onclick="tab('admin', this)" style="color:#d93025; border:1px solid #d93025; margin:10px;">⚡ Админка</div>
            
            <div style="margin-top: auto; padding: 20px;">
                <button class="btn" style="width:100%; border:1px solid var(--g-border); background:none; color:var(--g-text-light);" onclick="firebase.auth().signOut()">Выход</button>
            </div>
        </aside>

        <main class="main">
            <div id="v-games" class="view active">
                <h1>Библиотека</h1>
                <div class="grid">
                    <div class="card" onclick="play('Slime Clicker/index.html', 'Slime Clicker 2D')">
                        <div style="font-size:30px">🟢</div><b>Slime Clicker 2D</b><br><small>by Mark-42</small>
                    </div>
                    <div class="card" onclick="play('ELBERR_OS/Chapter1/index.html', 'ELBERR OS: Глава 1')">
                        <div style="font-size:30px">💾</div><b>ELBERR: CH 1</b>
                    </div>
                    <div class="card" onclick="play('ELBERR_OS/Chapter2/index.html', 'ELBERR OS: Глава 2')">
                        <div style="font-size:30px">📂</div><b>ELBERR: CH 2</b>
                    </div>
                    <div class="card" onclick="play('ELBERR_OS/Chapter3/index.html', 'ELBERR OS: Глава 3')">
                        <div style="font-size:30px">🗄️</div><b>ELBERR: CH 3</b>
                    </div>
                </div>
            </div>

            <div id="v-social" class="view">
                <h1>Лента сообщества</h1>
                <div style="background:var(--g-surface); padding:15px; border-radius:8px; border:1px solid var(--g-border); margin-bottom:25px;">
                    <textarea id="p-input" placeholder="О чем думаешь?" style="width:100%; border:none; outline:none; background:transparent; color:var(--g-text); resize:none; font-size:15px; height:50px;"></textarea>
                    <button class="btn btn-blue" style="float:right" onclick="addPost()">Опубликовать</button>
                    <div style="clear:both"></div>
                </div>
                <div id="p-list"></div>
            </div>

            <div id="v-chats" class="view">
                <h1>Мессенджер</h1>
                <div id="rooms-view">
                    <div style="display:flex; gap:10px; margin-bottom:20px;">
                        <input type="text" id="r-name" placeholder="Название комнаты">
                        <button class="btn btn-blue" onclick="addRoom()">Создать</button>
                    </div>
                    <div id="r-list" class="grid" style="grid-template-columns: 1fr 1fr;"></div>
                </div>

                <div id="chat-ui" class="hidden">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                        <h3 id="cur-r">Чат</h3>
                        <button class="btn" style="background:var(--g-surface)" onclick="backToRooms()">⬅ К списку</button>
                    </div>
                    <div id="chat-window"></div>
                    <div style="display:flex; gap:10px; margin-top:10px;">
                        <input type="text" id="m-input" placeholder="Напиши..." onkeydown="if(event.key==='Enter') sendMsg()">
                        <button class="btn btn-blue" onclick="sendMsg()">></button>
                    </div>
                </div>
            </div>

            <div id="v-settings" class="view">
                <h1>Настройки</h1>
                <div class="post">
                    <h3>Тема оформления</h3>
                    <button class="btn" onclick="setTheme('light')" style="border:1px solid #ccc">☀️ Светлая</button>
                    <button class="btn" onclick="setTheme('dark')" style="background:#222; color:white; margin-left:10px;">🌙 Темная</button>
                </div>
            </div>

            <div id="v-admin" class="view">
                <h1>Панель Создателя</h1>
                <div class="post" style="border-color:#d93025">
                    <p>Опасные действия:</p>
                    <button class="btn btn-blue" style="background:#d93025" onclick="db.ref('posts').remove()">Удалить все посты</button>
                    <button class="btn btn-blue" style="background:#d93025; margin-left:10px;" onclick="db.ref('rooms').remove(); db.ref('messages').remove();">Сбросить мессенджер</button>
                </div>
            </div>
        </main>
    </div>

    <div id="game-overlay">
        <div class="bar">
            <span id="gt">Игра</span>
            <button class="btn" style="background:#444; color:white; padding:4px 12px; font-size:12px;" onclick="closePlay()">Закрыть X</button>
        </div>
        <iframe id="gf"></iframe>
    </div>

    <script>
        const config = {
            apiKey: "AIzaSyDnniEB9asHQFUl0wwZvkxXpmDi9l_lYAI",
            authDomain: "gamesfan-17986.firebaseapp.com",
            projectId: "gamesfan-17986",
            databaseURL: "https://gamesfan-17986-default-rtdb.firebaseio.com/",
            appId: "1:311654524584:web:9283eea0aea6f7b946849d"
        };
        firebase.initializeApp(config);
        const auth = firebase.auth();
        const db = firebase.database();

        let isLogin = true;
        let myNick = "User";
        let curRoomId = null;

        function swapAuth() {
            isLogin = !isLogin;
            document.getElementById('at').innerText = isLogin ? "GamesFan PRO" : "Регистрация";
            document.getElementById('a-nick').style.display = isLogin ? "none" : "block";
            document.getElementById('swap-btn').innerText = isLogin ? "Нет аккаунта? Создать" : "Уже есть аккаунт? Войти";
        }

        async function handleAuth() {
            const e = document.getElementById('a-email').value;
            const p = document.getElementById('a-pass').value;
            const n = document.getElementById('a-nick').value;
            try {
                if(isLogin) { await auth.signInWithEmailAndPassword(e, p); }
                else {
                    const r = await auth.createUserWithEmailAndPassword(e, p);
                    await db.ref('users/' + r.user.uid).set({ nick: n });
                }
            } catch(err) { alert(err.message); }
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app').style.display = 'grid';
                if(user.email === "vetrovlev1@gmail.com") document.getElementById('adm').classList.remove('hidden');
                db.ref('users/' + user.uid).on('value', s => { myNick = s.val() ? s.val().nick : "Игрок"; });
                loadPosts(); loadRooms();
            } else { document.getElementById('auth-screen').style.display = 'flex'; document.getElementById('app').style.display = 'none'; }
        });

        function tab(id, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('v-' + id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }

        // POSTS (SAVING)
        function addPost() {
            const txt = document.getElementById('p-input').value;
            if(!txt) return;
            db.ref('posts').push({ author: myNick, text: txt, time: Date.now() });
            document.getElementById('p-input').value = "";
        }

        function loadPosts() {
            db.ref('posts').on('value', s => {
                const list = document.getElementById('p-list'); list.innerHTML = "";
                s.forEach(p => {
                    const d = p.val();
                    list.innerHTML = `<div class="post"><div class="post-author">${d.author}</div><div>${d.text}</div></div>` + list.innerHTML;
                });
            });
        }

        // CHATS (SAVING)
        function addRoom() {
            const n = document.getElementById('r-name').value;
            if(!n) return;
            db.ref('rooms').push({ name: n });
            document.getElementById('r-name').value = "";
        }

        function loadRooms() {
            db.ref('rooms').on('value', s => {
                const list = document.getElementById('r-list'); list.innerHTML = "";
                s.forEach(r => {
                    list.innerHTML += `<div class="card" style="padding:12px" onclick="joinRoom('${r.key}', '${r.val().name}')">${r.val().name}</div>`;
                });
            });
        }

        function joinRoom(id, name) {
            curRoomId = id;
            document.getElementById('rooms-view').classList.add('hidden');
            document.getElementById('chat-ui').classList.remove('hidden');
            document.getElementById('cur-r').innerText = name;
            
            // Загрузка истории сообщений
            const win = document.getElementById('chat-window');
            db.ref('messages/' + id).on('value', s => {
                win.innerHTML = "";
                s.forEach(m => {
                    const d = m.val();
                    const cls = d.u === myNick ? 'bubble-me' : 'bubble-them';
                    win.innerHTML += `<div class="bubble ${cls}"><small>${d.u}</small>${d.t}</div>`;
                });
                win.scrollTop = win.scrollHeight;
            });
        }

        function backToRooms() {
            if(curRoomId) db.ref('messages/' + curRoomId).off();
            document.getElementById('rooms-view').classList.remove('hidden');
            document.getElementById('chat-ui').classList.add('hidden');
        }

        function sendMsg() {
            const i = document.getElementById('m-input');
            if(!i.value || !curRoomId) return;
            db.ref('messages/' + curRoomId).push({ u: myNick, t: i.value, time: Date.now() });
            i.value = "";
        }

        // GAMES
        function play(path, title) {
            document.getElementById('game-overlay').style.display = 'flex';
            document.getElementById('gt').innerText = title;
            document.getElementById('gf').src = path + "?v=" + Date.now();
        }
        function closePlay() { document.getElementById('game-overlay').style.display = 'none'; document.getElementById('gf').src = ""; }

        function setTheme(t) { document.documentElement.setAttribute('data-theme', t); localStorage.setItem('gf-theme', t); }
        setTheme(localStorage.getItem('gf-theme') || 'light');
    </script>
</body>
</html>
