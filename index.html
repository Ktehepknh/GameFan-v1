<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GamesFan OS | Mark-42 Studio</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #00adff; --bg: #0d1117; --card: #161b22; --text: #c9d1d9; }
        [data-theme="dark-red"] { --primary: #ff4444; --bg: #1a0505; }
        
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
        
        /* AUTH SCREEN */
        #auth-screen { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; justify-content: center; align-items: center; }
        .auth-box { background: var(--card); padding: 30px; border-radius: 20px; width: 300px; text-align: center; border: 1px solid #30363d; }
        input { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid #30363d; background: #010409; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn-main { background: var(--primary); color: #000; }

        /* MAIN APP */
        #app { display: none; height: 100vh; grid-template-columns: 260px 1fr 300px; }
        
        /* SIDEBAR & NAV */
        .sidebar { background: #010409; padding: 20px; border-right: 1px solid #30363d; }
        .nav-item { padding: 12px; cursor: pointer; border-radius: 10px; margin-bottom: 5px; }
        .nav-item:hover, .active { background: #161b22; color: var(--primary); }

        /* CONTENT */
        .main-view { padding: 30px; overflow-y: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .game-card { background: var(--card); border-radius: 12px; padding: 15px; text-align: center; border: 1px solid #30363d; cursor: pointer; }

        /* FRIENDS & CHAT */
        .friends-panel { background: #010409; border-left: 1px solid #30363d; display: flex; flex-direction: column; }
        .chat-box { flex-grow: 1; padding: 15px; overflow-y: auto; font-size: 14px; }
        .msg { margin-bottom: 10px; padding: 8px; background: #161b22; border-radius: 8px; }
        .msg b { color: var(--primary); }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-box">
            <h1 style="color:var(--primary)">GamesFan</h1>
            <input type="text" id="reg-nick" placeholder="Никнейм">
            <input type="email" id="reg-email" placeholder="Email">
            <input type="password" id="reg-pass" placeholder="Пароль">
            <button class="btn btn-main" onclick="register()">Создать аккаунт</button>
            <button class="btn" style="color:white" onclick="login()">Войти</button>
        </div>
    </div>

    <div id="app">
        <aside class="sidebar">
            <h2>GamesFan</h2>
            <div class="nav-item active" onclick="showTab('home')">🎮 Игры</div>
            <div class="nav-item" onclick="showTab('profile')">👤 Профиль</div>
            <div class="nav-item" onclick="showTab('settings')">⚙️ Настройки</div>
            <button class="btn" onclick="firebase.auth().signOut()" style="margin-top:20px; background:#30363d; color:white">Выйти</button>
        </aside>

        <main class="main-view">
            <div id="tab-home">
                <h1>Мои игры</h1>
                <div class="grid">
                    <div class="game-card" onclick="alert('Запуск Slime Clicker...')">🟢 Slime Clicker</div>
                    <div class="game-card" onclick="alert('Запуск Runner...')">🏃 Runner 2D</div>
                </div>
            </div>

            <div id="tab-profile" class="hidden">
                <h1>Твой Профиль</h1>
                <div style="background:var(--card); padding:20px; border-radius:15px;">
                    <p>Ник: <b id="p-nick">...</b></p>
                    <p>Email: <span id="p-email">...</span></p>
                </div>
            </div>

            <div id="tab-settings" class="hidden">
                <h1>Настройки</h1>
                <p>Тема интерфейса:</p>
                <button class="btn" onclick="setTheme('dark')">Dark Blue (Default)</button>
                <button class="btn" onclick="setTheme('dark-red')" style="background:#ff4444">Blood Red</button>
            </div>
        </main>

        <section class="friends-panel">
            <div style="padding:15px; border-bottom:1px solid #30363d">
                <h3>Друзья Онлайн</h3>
                <input type="text" id="find-friend" placeholder="Ник друга...">
                <button class="btn btn-main" style="padding:5px" onclick="addFriend()">+</button>
            </div>
            <div class="chat-box" id="chat">
                <div class="msg">Система: Добро пожаловать в чат!</div>
            </div>
            <div style="padding:10px">
                <input type="text" id="m-text" placeholder="Сообщение...">
                <button class="btn btn-main" onclick="sendMsg()">Отправить</button>
            </div>
        </section>
    </div>

    <script>
        // КОНФИГ FIREBASE (Вставь свои данные сюда!)
        const firebaseConfig = {
            apiKey: "ТВОЙ_API_KEY",
            authDomain: "твой-проект.firebaseapp.com",
            databaseURL: "https://твой-проект.firebaseio.com",
            projectId: "твой-проект",
            appId: "твой-id"
        };
        firebase.initializeApp(firebaseConfig);

        const auth = firebase.auth();
        const db = firebase.database();

        // РЕГИСТРАЦИЯ
        async function register() {
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;
            const nick = document.getElementById('reg-nick').value;
            
            try {
                const res = await auth.createUserWithEmailAndPassword(email, pass);
                await db.ref('users/' + res.user.uid).set({ nick: nick, email: email });
                alert("Аккаунт создан!");
            } catch(e) { alert(e.message); }
        }

        // ВХОД
        function login() {
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;
            auth.signInWithEmailAndPassword(email, pass).catch(e => alert(e.message));
        }

        // ОБНОВЛЕНИЕ ИНТЕРФЕЙСА
        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app').style.display = 'grid';
                db.ref('users/' + user.uid).once('value', s => {
                    document.getElementById('p-nick').innerText = s.val().nick;
                    document.getElementById('p-email').innerText = s.val().email;
                });
                loadChat();
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('app').style.display = 'none';
            }
        });

        // ЧАТ
        function sendMsg() {
            const text = document.getElementById('m-text').value;
            const nick = document.getElementById('p-nick').innerText;
            if(text) {
                db.ref('chat').push({ nick, text });
                document.getElementById('m-text').value = "";
            }
        }

        function loadChat() {
            db.ref('chat').limitToLast(20).on('child_added', s => {
                const data = s.val();
                document.getElementById('chat').innerHTML += `<div class="msg"><b>${data.nick}:</b> ${data.text}</div>`;
                document.getElementById('chat').scrollTop = 9999;
            });
        }

        // ТАБЫ И НАСТРОЙКИ
        function showTab(id) {
            document.querySelectorAll('.main-view > div').forEach(d => d.classList.add('hidden'));
            document.getElementById('tab-' + id).classList.remove('hidden');
        }

        function setTheme(t) { document.documentElement.setAttribute('data-theme', t); }
    </script>
</body>
</html>
